name: wjecampus
services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-wjecampus}-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wjecampus}
      POSTGRES_USER: ${POSTGRES_USER:-wjecampus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wjecampus123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wjecampus} -d ${POSTGRES_DB:-wjecampus}"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-wjecampus}-backend
    command: >
      sh -c "PYTHONPATH=. python seeds/seed_all.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 38303"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-wjecampus}:${POSTGRES_PASSWORD:-wjecampus123}@db:5432/${POSTGRES_DB:-wjecampus}
    ports:
      - "38303:38303"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:38303/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
  frontend:
    build: ./frontend
    container_name: ${COMPOSE_PROJECT_NAME:-wjecampus}-frontend
    ports:
      - "38203:38203"
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres_data:
